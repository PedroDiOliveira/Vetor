<button type="button" class="card" (click)="onClick()">
  <div class="avatar">{{ member().avatar }}</div>
  <div class="body">
    <p class="name">{{ member().name }}</p>
    @if (member().description) {
      <p class="desc">{{ member().description }}</p>
    } @else {
      <p class="desc faint">sem descrição</p>
    }
  </div>
  <ng-icon name="lucidePencil" size="14" class="edit-hint" />
</button>
