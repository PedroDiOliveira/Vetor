<div class="dash">
  <div class="stat">
    <span class="num">{{ ativas() }}</span>
    <span class="label">Ativas</span>
  </div>

  <div class="divider"></div>

  <div class="stat">
    <span class="num">{{ concluidasSemana() }}</span>
    <span class="label">Esta semana</span>
  </div>

  <div class="divider"></div>

  <div class="stat">
    <span class="num">{{ concluidasMes() }}</span>
    <span class="label">Este mês</span>
  </div>

  @if (podium().length > 0) {
    <div class="divider"></div>

    <div class="podium-wrap">
      <span class="podium-label">Semana</span>
      <div class="podium">
        @for (entry of podium(); track entry.rank) {
          <div class="podium-entry">
            <span class="rank" [class]="'rank-' + entry.rank">{{ entry.rank }}</span>
            <div class="avatar">{{ entry.avatar }}</div>
            <div class="info">
              <span class="pname">{{ entry.name }}</span>
              <span class="pcount">{{ entry.count }} concluída{{ entry.count !== 1 ? 's' : '' }}</span>
            </div>
          </div>
        }
      </div>
    </div>
  }
</div>
