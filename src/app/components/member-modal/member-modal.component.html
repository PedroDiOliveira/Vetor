<div class="overlay" (click)="onBackdrop($event)">
  <section class="modal" [style.--accent]="accent()">
    <header>
      <div class="member">
        <div class="avatar">{{ member().avatar }}</div>
        <div>
          <p class="name">{{ member().name }}</p>
          <p class="meta">
            <ng-icon [name]="icon()" size="11" />
            <span>{{ columnLabel() }}</span>
          </p>
        </div>
      </div>
      <button type="button" class="icon-btn" (click)="close.emit()" title="Fechar">
        <ng-icon name="lucideX" size="16" />
      </button>
    </header>

    <div class="body">
      <label>Descrição</label>
      <textarea
        rows="5"
        placeholder="No que está trabalhando agora?"
        [value]="description()"
        (input)="description.set($any($event.target).value)"
      ></textarea>
    </div>

    <footer>
      <button type="button" class="ghost danger" (click)="onRemove()" title="Remover membro">
        <ng-icon name="lucideTrash2" size="14" />
        <span>Remover</span>
      </button>
      <div class="right">
        <button type="button" class="ghost" (click)="close.emit()">Cancelar</button>
        <button type="button" class="primary" (click)="onSave()">
          <ng-icon name="lucideCheck" size="14" />
          <span>Salvar</span>
        </button>
      </div>
    </footer>
  </section>
</div>
