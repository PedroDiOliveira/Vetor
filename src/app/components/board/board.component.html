<div class="app">
  <!-- Topbar -->
  <header class="topbar">
    <div class="brand">
      <h1 class="wordmark">Vetor</h1>
      <span class="task-count">{{ tasks().length }}</span>
    </div>
    <div class="actions">
      <button type="button" class="ghost" (click)="addTask()">
        <ng-icon name="lucidePlus" size="14" />
        <span>Tarefa</span>
      </button>
      <button type="button" class="icon-btn" (click)="logout()" title="Sair">
        <ng-icon name="lucideLogOut" size="16" />
      </button>
    </div>
  </header>

  <!-- Erro Firestore -->
  @if (firestoreError(); as err) {
    <div class="firestore-error">
      <ng-icon name="lucideX" size="14" />
      <span>Firestore: {{ err }}</span>
      <button type="button" (click)="firestoreError.set(null)">
        <ng-icon name="lucideX" size="12" />
      </button>
    </div>
  }

  <!-- Dashboard strip -->
  <app-dashboard />

  <!-- Pool de membros disponíveis -->
  <app-member-pool
    [connectedTo]="poolAndTaskIds()"
    (assigneeDropped)="onAssigneeDropped(null, $event)"
    (addMember)="addMember()"
    (removeMember)="removeMember($event)"
  />

  <!-- Board -->
  <main class="board">
    @for (col of columns; track col.id) {
      <app-column
        [column]="col"
        [tasks]="tasksOf(col.id)"
        [connectedAreaIds]="areaIds"
        [connectedTaskIds]="poolAndTaskIds()"
        (taskDropped)="onTaskDropped(col.id, $event)"
        (assigneeDropped)="onAssigneeDropped($event.container.id.replace('task-', ''), $event)"
        (taskClicked)="openTask($event)"
        (taskCompleted)="completeTask($event.id)"
      />
    }
  </main>

  <!-- Task modal -->
  @if (selectedTask(); as task) {
    <app-task-modal
      [task]="task"
      (close)="closeModal()"
      (save)="saveTask($event)"
      (complete)="completeTask($event)"
      (reopen)="reopenTask($event)"
      (remove)="removeTask($event)"
      (toggleAssignee)="toggleAssignee($event)"
    />
  }

  <!-- Add task modal -->
  @if (showAddTask()) {
    <app-add-task-modal
      (confirm)="confirmAddTask($event)"
      (close)="showAddTask.set(false)"
    />
  }

  <!-- Add member modal -->
  @if (showAddMember()) {
    <app-add-member-modal
      (confirm)="confirmAddMember($event)"
      (close)="showAddMember.set(false)"
    />
  }
</div>
